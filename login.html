<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scaffix</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">

    <!-- Explicit override for body background to ensure it looks good standalone -->
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card a {
            transition: opacity var(--transition), text-decoration var(--transition);
        }
        .auth-card a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .auth-logo:hover {
            text-decoration: none !important;
            opacity: 1 !important;
        }
        .auth-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            width: 100%;
        }
        .auth-actions {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: var(--space-2);
            z-index: 10;
        }
        [dir="rtl"] .auth-actions {
            right: auto;
            left: 24px;
        }
        @media (max-width: 576px) {
            .auth-wrapper {
                justify-content: flex-start;
                padding-top: 24px;
            }
            .auth-actions {
                position: static;
                margin-bottom: 16px;
                width: 100%;
                max-width: 480px;
                justify-content: flex-end;
                padding: 0 16px;
            }
            [dir="rtl"] .auth-actions {
                justify-content: flex-start;
            }
            .auth-card {
                padding: var(--space-6) var(--space-4) !important;
            }
            .auth-remember-row {
                gap: var(--space-2);
            }
            .auth-remember-row label,
            .auth-remember-row a {
                font-size: 12px !important;
            }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body>

    <main class="auth-wrapper">
        <div class="auth-actions">
            <button class="icon-btn rtl-toggle" aria-label="Toggle RTL" title="Toggle RTL">
                <i class="ph ph-arrows-left-right"></i>
            </button>
            <button class="icon-btn theme-toggle" aria-label="Toggle dark mode" title="Toggle Theme">
                <i class="ph ph-moon"></i>
            </button>
        </div>

        <div class="auth-card animate-slide-up">
            <a href="index.html" class="auth-logo">
                <i class="ph-fill ph-buildings"></i> Scaffix
            </a>

            <h2 style="margin-bottom: 32px; font-size: var(--size-h3);">Welcome Back</h2>

            <form action="#" method="POST" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="">
                    <span class="error-msg">Enter a valid email address</span>
                </div>

                <div class="form-group" style="margin-bottom: var(--space-3);">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="">
                    <span class="error-msg">Password is required (min 8 characters)</span>
                </div>

                <div class="auth-remember-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); width: 100%;">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="remember" name="remember" style="cursor: pointer; width: 15px; height: 15px; accent-color: var(--color-primary);">
                        <label for="remember" style="font-size: var(--size-caption); cursor: pointer; user-select: none; margin-bottom: 0; white-space: nowrap;">Remember me</label>
                    </div>
                    <a href="#" style="font-size: var(--size-caption); color: var(--color-primary); font-weight: var(--weight-bold-inline); white-space: nowrap;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 16px;">Login</button>
            </form>

            <div class="auth-separator">OR</div>

            <button class="social-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22-.03-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                Continue with Google
            </button>
            <button class="social-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.51-.62.73-1.16 1.87-1.02 2.98 1.1.09 2.23-.62 2.95-1.43z"/>
                </svg>
                Continue with Apple
            </button>

            <p style="margin-top: 32px; font-size: var(--size-label);">
                Don't have an account? <a href="register.html"
                    style="color: var(--color-primary); font-weight: var(--weight-bold-inline);">Register</a>
            </p>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>

</html>
