<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scaffix</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <!-- Explicit override for body background to ensure it looks good standalone -->
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <main class="auth-wrapper" style="width: 100%;">
        <div class="auth-card animate-slide-up">
            <div class="auth-logo">
                <i class="ph-fill ph-buildings"></i> Scaffix
            </div>
            
            <h2 style="margin-bottom: 32px; font-size: var(--size-h3);">Welcome Back</h2>
            
            <form action="#" method="POST" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@company.com">
                    <span class="error-msg">Enter a valid email address</span>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
                        <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: var(--size-caption); color: var(--color-primary);">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢ﾃδ｢ﾃ｢窶堋ｬﾃつ｢">
                    <span class="error-msg">Password is required (min 8 characters)</span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 16px;">Login</button>
            </form>
            
            <div class="auth-separator">OR</div>
            
            <button class="social-btn">
                <i class="ph-fill ph-google-logo" style="color: #DB4437; font-size: 20px;"></i> Continue with Google
            </button>
            <button class="social-btn">
                <i class="ph-fill ph-apple-logo" style="font-size: 20px;"></i> Continue with Apple
            </button>
            
            <p style="margin-top: 32px; font-size: var(--size-label);">
                Don't have an account? <a href="register.html" style="color: var(--color-primary); font-weight: var(--weight-bold-inline);">Register</a>
            </p>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
